name: Test and linter

on:
  #pull_request:
  #workflow_dispatch:
  push:
    #branches:
    #- cairo-ci
    #- cairo-1

env:
  CARGO_TERM_COLOR: always

jobs:
  Lint and test:
    name: Rust project - latest
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - name: Install rust
      run: rustup update
    - name: Cairo linter
      #env:
      #  TOKEN: ${{ secrets.TOKEN }}
      run: make check-format
