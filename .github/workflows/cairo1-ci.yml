name: Test and linter

on:
  #pull_request:
  #workflow_dispatch:
  push:
    branches:
    - cairo1-ci
    #- cairo-1

env:
  CARGO_TERM_COLOR: always

jobs:
  lint_and_test:
    name: Cairo lint and test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - name: Markdown lint
      uses: docker://avtodev/markdown-lint:v1
      with:
        args: README.md CONTRIBUTING.md docs
    - name: Cairo linter
      run: make check-format
    - name: Cairo test
      run: make test
