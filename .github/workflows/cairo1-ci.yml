name: Test and linter

on:
  #pull_request:
  #workflow_dispatch:
  push:
    #branches:
    #- cairo-ci
    #- cairo-1


jobs:
  linter:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
          - beta
          - nightly
    steps:
      - uses: actions/checkout@v3
      - run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
    steps:
    - uses: actions/checkout@v2
    - name: Cairo linter
      env:
        TOKEN: ${{ secrets.TOKEN }}
      run: make format
